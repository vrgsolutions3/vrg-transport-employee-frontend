steps:
  - name: Checkout
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Configurar Git
    run: |
      git config user.name "github-actions"
      git config user.email "actions@github.com"

  - name: Adicionar upstream
    run: |
      git remote add upstream https://github.com/VRGOrganization/vrg-transport-employee-frontend.git

  - name: Sincronizar
    run: |
      git fetch upstream
      git checkout main
      git merge upstream/main || true

  - name: Push
    run: |
      git push origin main
